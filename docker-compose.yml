# google-mcp — multi-tenant Google Workspace MCP server.
# All operator secrets are read from environment variables (see .env.example).
# Per-user Google refresh tokens are stored encrypted in the SQLite database.
services:
  google-mcp:
    build: .
    container_name: google-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8433}:8433"
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8433"
      BASE_URL: "${BASE_URL}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      JWT_SECRET: "${JWT_SECRET}"
      STORAGE_ENCRYPTION_KEY: "${STORAGE_ENCRYPTION_KEY}"
      DATABASE_URL: "/data/google-mcp.db"
      RUST_LOG: "${RUST_LOG:-google_mcp=info,rmcp=warn,reqwest=warn}"
      # File-exchange root. Bind-mounted below at the SAME absolute path so
      # the MCP client (on the host) and this server (in the container) name
      # files identically — no path translation. Unset FILE_ROOT to disable
      # filesystem file exchange and fall back to base64 only.
      FILE_ROOT: "${FILE_ROOT:-/srv/google-mcp/exchange}"
    volumes:
      - google-mcp-data:/data
      # Host <-> container file exchange, mounted at the identical path.
      # The container runs as uid 65532, so this directory must be writable
      # by that uid (e.g. `chmod 0777`, or pre-create it owned by 65532).
      - "${FILE_ROOT:-/srv/google-mcp/exchange}:${FILE_ROOT:-/srv/google-mcp/exchange}"

volumes:
  google-mcp-data:
